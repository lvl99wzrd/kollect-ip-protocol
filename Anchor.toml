[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.devnet]
ip_core = "Eo5G2gNsVKR2orqpqYippPwxjaZDPX3gALCtV9jU6wWm"
kollect = "P5UcEmMdxHvLFmkE743XzEg5pnN5csNb8jUxTWj6VoJ"

[programs.localnet]
ip_core = "Eo5G2gNsVKR2orqpqYippPwxjaZDPX3gALCtV9jU6wWm"
kollect = "P5UcEmMdxHvLFmkE743XzEg5pnN5csNb8jUxTWj6VoJ"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
create_entity = "npx ts-node scripts/create_entity.ts"
get_config = "npx ts-node scripts/get_config.ts"
get_entities = "npx ts-node scripts/get_entities.ts"
get_ips = "npx ts-node scripts/get_ips.ts"
get_metadata = "npx ts-node scripts/get_metadata.ts"
get_schemas = "npx ts-node scripts/get_schemas.ts"
initialize_config = "npx ts-node scripts/initialize_config.ts"
initialize_treasury = "npx ts-node scripts/initialize_treasury.ts"
kollect_get_entity_treasury = "npx ts-node scripts/kollect/get_entity_treasury.ts"
kollect_get_platform_config = "npx ts-node scripts/kollect/get_platform_config.ts"
kollect_initialize_entity_treasury = "npx ts-node scripts/kollect/initialize_entity_treasury.ts"
kollect_initialize_platform = "npx ts-node scripts/kollect/initialize_platform.ts"
kollect_update_platform_config = "npx ts-node scripts/kollect/update_platform_config.ts"
kollect_withdraw_entity_earnings = "npx ts-node scripts/kollect/withdraw_entity_earnings.ts"
kollect_withdraw_platform_fees = "npx ts-node scripts/kollect/withdraw_platform_fees.ts"
register_schema = "npx ts-node scripts/register_schema.ts"
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""
update_config = "npx ts-node scripts/update_config.ts"
